<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.jsdelivr.net/npm/lil-gui@0.19/dist/lil-gui.umd.min.js"></script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Survival Lesson · Phaser</title>
  <link rel="icon" href="data:," />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100vw; height: 100vh;
      background: #1a1008;
      overflow: hidden;
    }
    /* Scale.FIT 会算出一个内嵌 1280×720 比例的 canvas，并由 autoCenter 居中；
       #game 只提供满屏挂载点，余下空白由底色填补（letterbox / pillarbox）。 */
    #game {
      width: 100vw; height: 100vh;
      display: block;
    }
    #game canvas {
      display: block;
      margin: 0 auto;
      /* 显式 smooth，避免个别 UA 对缩放后的 canvas 用邻近插值，产生锯齿。 */
      image-rendering: auto;
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
</head>
<body>
<div id="game"></div>
<!-- Phaser 全局 → src/main.js 注入配置并链式加载 public/js 场景与 MainConfig -->
<script type="module" src="./src/main.js"></script>
</body>
</html>
